<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Constellation</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="universe">
      <!-- Fundo -->

      <div class="background"></div>

      <div class="nebula"></div>

      <div class="stars"></div>

      <!-- Partículas -->

      <canvas id="particles"></canvas>

      <!-- Glow -->

      <div class="glow"></div>

      <!-- Planeta -->

      <section class="centerScene">
        <div class="planet">
          <div class="planetGlow"></div>

          <img
            src="assets/img/planet.png"
            class="planet-texture"
            alt="Planeta"
          />
        </div>
      </section>

      <!-- Constelação -->

      <section class="constellation">
        <div class="member s4m">✦ S4M</div>

        <div class="member eva">✦ EVA</div>

        <div class="member juju">✦ JUJU</div>

        <div class="member marcele">✦ MARCELE</div>

        <div class="member brunna">✦ BRUNNA</div>

        <div class="member eden">✦ EDEN</div>

        <div class="member ellie">✦ ELLIE</div>
      </section>

      <!-- Mensagem -->

      <div class="startMessage">✨ Clique em uma estrela para começar ✨</div>
    </div>

    <!-- Overlay -->

    <div class="overlay">
      <div id="envelopeScene"></div>
    </div>

    <div id="lightBeam"></div>

    <!-- JavaScript -->

    <script type="module" src="script.js"></script>
  </body>
</html>
