<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Constellation</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="universe">
      <div class="background"></div>

      <div class="nebula"></div>

      <div class="stars"></div>

      <div class="glow"></div>

      <div class="planet">
        <img src="assets/img/planet.png" class="planet-texture" />

        <div class="orbit">
          <div class="member s4m">S4M</div>
          <div class="member juju">JUJU</div>
          <div class="member marcele">MARCELE</div>
          <div class="member eva">EVA</div>
          <div class="member eden">EDEN</div>
          <div class="member ellie">ELLIE</div>
          <div class="member brunna">BRUNNA</div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
