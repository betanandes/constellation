<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Constellation</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="universe">
      <div class="background"></div>

      <div class="nebula"></div>

      <div class="stars"></div>

      <canvas id="spaceParticles"></canvas>

      <div class="centerScene">
        <div class="overlay"></div>

        <!-- CARTA ANTIGA (mantida por segurança) -->

        <div class="letterContainer">
          <div class="letter">
            <button class="closeLetter">✕</button>

            <h2 class="letterTitle"></h2>

            <p class="letterText"></p>
          </div>
        </div>

        <div class="glow"></div>

        <!-- ENVELOPE CÓSMICO -->

        <div class="cosmicEnvelope">
          <div class="envelopeGlow"></div>

          <div class="envelopeBody">
            <div class="envelopeFlap"></div>

            <div class="envelopeSeal">✦</div>

            <div class="cosmicLetter">
              <h2 class="cosmicLetterTitle"></h2>

              <p class="cosmicLetterText"></p>
            </div>
          </div>
        </div>

        <!-- PLANETA -->

        <div class="planet">
          <div class="planetGlow"></div>

          <img
            src="assets/img/planet.png"
            class="planet-texture"
            alt="Planeta"
          />
        </div>

        <!-- CONSTELAÇÃO -->

        <div class="constellation">
          <div class="member s4m">✦ S4M</div>

          <div class="member juju">✦ JUJU</div>

          <div class="member marcele">✦ MARCELE</div>

          <div class="member eva">✦ EVA</div>

          <div class="member eden">✦ EDEN</div>

          <div class="member ellie">✦ ELLIE</div>

          <div class="member brunna">✦ BRUNNA</div>
        </div>
      </div>
    </div>

    <!-- COMPONENTES -->

    <script src="components/typewriter.js"></script>

    <script src="components/audio.js"></script>

    <script src="components/constellation.js"></script>

    <script src="components/parallax.js"></script>

    <script src="components/particles.js"></script>

    <script src="components/universe.js"></script>

    <script src="components/envelope.js"></script>

    <script src="script.js"></script>
  </body>
</html>
